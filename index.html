<!DOCTYPE html>
<html>
<head>
  <title>Reminders</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="appContainer" class="app intro">

  <!-- intro screen -->
  <div id="introView" class="intro-view">
    <h1>Reminders</h1>
    <button onclick="enterApp()">Make a new reminder</button>
  </div>

  <!-- the main app -->
  <div id="mainView" class="hidden">
    <div class="header">
      <h1>Reminders</h1>
    </div>

    <div class="input-area">
      <input id="taskInput" placeholder="New task...">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
